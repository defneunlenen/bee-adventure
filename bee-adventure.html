<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ari Macerasi - Bee Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            border: 3px solid #f4a261;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(244, 162, 97, 0.3);
        }
        #ui-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            display: none;
            z-index: 10;
        }
        #ui-overlay h1 { font-size: 48px; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        #ui-overlay p { font-size: 20px; margin: 15px 0; }
        #ui-overlay button {
            padding: 12px 36px;
            font-size: 20px;
            background: linear-gradient(135deg, #f4a261, #e76f51);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        #ui-overlay button:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay">
        <h1 id="overlay-title"></h1>
        <p id="overlay-text"></p>
        <button id="overlay-btn" onclick="startGame()">Basla</button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/input.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/player.js"></script>
    <script src="js/level.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
